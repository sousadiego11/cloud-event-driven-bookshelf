<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookshelf API - Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>

<body>

    <h1>Bookshelf API</h1>
    <div class="grid">

        <div class="card">
            <h2><i class="ti ti-api"></i> API Config</h2>
            <div class="config-row"><label>REST URL</label><input id="restUrl" value="http://localhost:3000"></div>
        </div>

        <div class="card">
            <h2><i class="ti ti-plug"></i> WebSocket</h2>
            <div class="config-row"><label>WS URL</label><input id="wsUrl" value="ws://localhost:8000"></div>
            <div class="actions">
                <button class="primary" onclick="wsConnect()"><i class="ti ti-plug"></i> Connect</button>
                <span id="wsStatus" class="badge warn">disconnected</span>
            </div>
            <div class="ws-log" id="wsLog">
                <div class="ws-ev"><span>—</span>waiting for connection</div>
            </div>
        </div>

        <div class="card full" id="notif-card">
            <h2><i class="ti ti-bell"></i> Notifications <button style="float:right;margin-top:-2px"
                    onclick="document.getElementById('notifications').innerHTML=''; document.getElementById('notif-card').classList.remove('has-notifs')">Clear</button>
            </h2>
            <div class="notif-list" id="notifications">
                <div class="notif-empty">No notifications yet</div>
            </div>
        </div>

        <div class="card full">
            <h2>Register book</h2>
            <div id="f-book"></div>
            <div class="actions"><button class="primary" onclick="submit('book')">Register</button></div>
            <div class="msg" id="msg-book"></div>
        </div>

        <div class="card">
            <h2>Loan book</h2>
            <div id="f-loan"></div>
            <div class="actions"><button class="primary" onclick="submit('loan')">Loan</button></div>
            <div class="msg" id="msg-loan"></div>
        </div>

        <div class="card">
            <h2>Return book</h2>
            <div id="f-return"></div>
            <div class="actions"><button class="primary" onclick="submit('return')">Return</button></div>
            <div class="msg" id="msg-return"></div>
        </div>

        <div class="card full">
            <h2>
                Books
                <button style="float:right;margin-top:-2px" onclick="listData('books')"><i class="ti ti-refresh"></i>
                    Refresh</button>
            </h2>
            <div id="tbl-books">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>ISBN</th>
                            <th>ID</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" style="color:#999">Click refresh to load</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card full">
            <h2>
                Loans
                <button style="float:right;margin-top:-2px" onclick="listData('loans')"><i class="ti ti-refresh"></i>
                    Refresh</button>
            </h2>
            <div id="tbl-loans">
                <table>
                    <thead>
                        <tr>
                            <th>CPF</th>
                            <th>Book ID</th>
                            <th>Registered at</th>
                            <th>Returned</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="color:#999">Click refresh to load</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
