name: AWS Infra

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          cli_config_credentials_hostname: ${{ vars.TERRAFORM_HOSTNAME }}
          cli_config_credentials_token: ${{ secrets.TERRAFORM_TOKEN }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve

  deploy_lambdas:
    name: Deploy Lambdas
    runs-on: ubuntu-latest
    needs: terraform
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: register_book
            function_name: bookshelf-register-book
            handler: aws-apigateway/register_book.handler
          - key: register_loan
            function_name: bookshelf-register-loan
            handler: aws-apigateway/register_loan.handler
          - key: return_loan
            function_name: bookshelf-return-loan
            handler: aws-apigateway/return_loan.handler
          - key: notify_library_book_registered
            function_name: bookshelf-notify-library-book-registered
            handler: aws-sqs/notify_library_book_registered.handler
          - key: notify_library_loan_registered
            function_name: bookshelf-notify-library-loan-registered
            handler: aws-sqs/notify_library_loan_registered.handler
          - key: notify_library_loan_returned
            function_name: bookshelf-notify-library-loan-returned
            handler: aws-sqs/notify_library_loan_returned.handler
          - key: analyze_demand_loan_registered
            function_name: bookshelf-analyze-demand-loan-registered
            handler: aws-sqs/analyze_demand_loan_registered.handler

          - key: register_session
            function_name: bookshelf-register-session
            handler: aws-apigateway/register_session.handler

          - key: close_session
            function_name: bookshelf-close-session
            handler: aws-apigateway/close_session.handler

          - key: list_books
            function_name: bookshelf-list-books
            handler: aws-apigateway/list_books.handler

          - key: list_loans
            function_name: bookshelf-list-loans
            handler: aws-apigateway/list_loans.handler
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: bun install

      - name: Build Lambdas
        run: bun run build:lambdas

      - name: Deploy Lambda
        uses: aws-actions/aws-lambda-deploy@v1.1.0
        with:
          function-name: ${{ matrix.function_name }}
          code-artifacts-dir: ./dist
          handler: ${{ matrix.handler }}
          runtime: nodejs24.x
