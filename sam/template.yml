AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  cloud-event-driven-bookshelf

  Event-driven virtual bookshelf backend built with serverless architecture using
  AWS Lambda, API Gateway, EventBridge, SQS, and DynamoDB.

Globals:
  Function:
    Timeout: 3
    MemorySize: 128

Resources:
  RegisterBookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/register_book.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        RegisterBook:
          Type: Api
          Properties:
            Path: /books
            Method: post

  RegisterLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/register_loan.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        RegisterLoan:
          Type: Api
          Properties:
            Path: /loans
            Method: post

  ReturnLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/return_loan.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        ReturnLoan:
          Type: Api
          Properties:
            Path: /loans/return
            Method: post

  BookRegisteredNotifyLibraryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-sqs/notify_library_book_registered.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64

  NotifyLibraryLoanRegisteredFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-sqs/notify_library_loan_registered.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64

  NotifyLibraryLoanReturnedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-sqs/notify_library_loan_returned.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64

  AnalyzeDemandLoanRegisteredFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-sqs/analyze_demand_loan_registered.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64

  ListBooksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/list_books.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        ListBooks:
          Type: Api
          Properties:
            Path: /books
            Method: get

  ListLoansFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/list_loans.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        ListLoans:
          Type: Api
          Properties:
            Path: /loans
            Method: get
