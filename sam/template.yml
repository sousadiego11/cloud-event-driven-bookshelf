AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  cloud-event-driven-bookshelf

  Event-driven virtual bookshelf backend built with serverless architecture using
  AWS Lambda, API Gateway, EventBridge, SQS, and DynamoDB.

Globals:
  Function:
    Timeout: 3
    MemorySize: 128

Resources:
  RegisterBookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/register_book.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        RegisterBook:
          Type: Api
          Properties:
            Path: /books
            Method: post

  RegisterLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-apigateway/register_loan.handler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
      Events:
        RegisterLoan:
          Type: Api
          Properties:
            Path: /loans
            Method: post

  BookRegisteredNotifyLibraryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../dist
      Handler: aws-sqs/notify_library_book_registered.handler
      Runtime: nodejs24.x
